<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glass N Glass — Quotation & Invoice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0f7ff', 100: '#e0eefe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

  <!-- ============ APP SHELL ============ -->
  <div id="app-shell" class="min-h-screen">

    <!-- Header -->
    <header class="no-print bg-white border-b border-slate-200 sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="logo.png" alt="Glass N Glass" class="h-9 w-auto" />
          <span class="text-xs text-slate-500 hidden sm:inline border-l border-slate-200 pl-3">Quotation & Invoice Dashboard</span>
        </div>

        <nav class="flex items-center gap-1 bg-slate-100 rounded-lg p-1">
          <button data-tab="quotation" class="tab-btn px-4 py-1.5 text-sm font-medium rounded-md transition">Quotation</button>
          <button data-tab="invoice" class="tab-btn px-4 py-1.5 text-sm font-medium rounded-md transition">Invoice</button>
        </nav>

        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-500">GST %</label>
          <input id="gst-rate" type="number" min="0" max="100" step="0.01" value="18"
                 class="w-16 px-2 py-1 text-sm border border-slate-300 rounded-md text-right" />
        </div>
      </div>
    </header>

    <!-- ============ QUOTATION TAB ============ -->
    <section id="tab-quotation" class="tab-panel max-w-none mx-auto px-2 py-4 space-y-6">

      <!-- Project meta -->
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-700 mb-3">Project Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <label class="text-sm">
            <span class="text-slate-500 text-xs block mb-1">Client</span>
            <input id="meta-client" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" placeholder="Client name" />
          </label>
          <label class="text-sm">
            <span class="text-slate-500 text-xs block mb-1">Address</span>
            <input id="meta-address" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" placeholder="AMINGAON" />
          </label>
          <label class="text-sm">
            <span class="text-slate-500 text-xs block mb-1">Project</span>
            <input id="meta-project" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" placeholder="Project name" />
          </label>
          <label class="text-sm">
            <span class="text-slate-500 text-xs block mb-1">Date</span>
            <input id="meta-date" type="date" class="w-full px-3 py-2 border border-slate-300 rounded-md" />
          </label>
        </div>
      </div>

      <!-- ALL SECTIONS — and the per-section "+ Add" buttons that follow them — are rendered dynamically -->
      <div id="sections"></div>

      <!-- GRAND TOTAL -->
      <div class="bg-brand-600 text-white rounded-xl p-5 flex items-center justify-between">
        <span class="text-sm font-medium uppercase tracking-wider opacity-90">Grand Total</span>
        <span class="text-2xl font-semibold" id="grand-total">₹ 0.00</span>
      </div>

    </section>

    <!-- ============ INVOICE TAB ============ -->
    <section id="tab-invoice" class="tab-panel hidden max-w-7xl mx-auto px-6 py-6">

      <!-- Invoice controls (no-print) -->
      <div class="no-print bg-white rounded-xl border border-slate-200 p-5 mb-6">
        <div class="flex flex-wrap items-end gap-4 justify-between">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 flex-1">
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">Invoice No.</span>
              <input id="inv-no" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" />
            </label>
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">Customer No.</span>
              <input id="inv-customer-no" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" />
            </label>
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">Date</span>
              <input id="inv-date" type="date" class="w-full px-3 py-2 border border-slate-300 rounded-md" />
            </label>
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">P.O. No.</span>
              <input id="inv-po" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" />
            </label>
            <label class="text-sm md:col-span-2">
              <span class="text-slate-500 text-xs block mb-1">Salesperson</span>
              <input id="inv-salesperson" type="text" class="w-full px-3 py-2 border border-slate-300 rounded-md" />
            </label>
            <label class="text-sm md:col-span-2">
              <span class="text-slate-500 text-xs block mb-1">Bill To</span>
              <textarea id="inv-billto" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-md" placeholder="ATTN: Name / Dept&#10;Company Name&#10;Street Address&#10;City, ZIP&#10;Phone&#10;Email"></textarea>
            </label>
            <label class="text-sm md:col-span-2">
              <span class="text-slate-500 text-xs block mb-1">Remarks / Instructions</span>
              <textarea id="inv-remarks" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-md"></textarea>
            </label>
            <label class="text-sm md:col-span-2">
              <span class="text-slate-500 text-xs block mb-1">Footer notes (one per line)</span>
              <textarea id="inv-footer" rows="5" class="w-full px-3 py-2 border border-slate-300 rounded-md"></textarea>
            </label>
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">Shipping / Handling</span>
              <input id="inv-shipping" type="number" step="0.01" value="0" class="w-full px-3 py-2 border border-slate-300 rounded-md text-right" />
            </label>
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">Other</span>
              <input id="inv-other" type="number" step="0.01" value="0" class="w-full px-3 py-2 border border-slate-300 rounded-md text-right" />
            </label>
            <label class="text-sm">
              <span class="text-slate-500 text-xs block mb-1">Amount Paid</span>
              <input id="inv-paid" type="number" step="0.01" value="0" class="w-full px-3 py-2 border border-slate-300 rounded-md text-right" />
            </label>
          </div>
        </div>

        <div class="mt-5 pt-5 border-t border-slate-200 flex flex-wrap items-center justify-between gap-3">
          <div class="flex items-center gap-1 bg-slate-100 rounded-lg p-1">
            <button data-format="per-row" class="format-btn px-4 py-1.5 text-sm font-medium rounded-md">Per-row GST</button>
            <button data-format="bottom" class="format-btn px-4 py-1.5 text-sm font-medium rounded-md">Bottom GST</button>
          </div>
          <button id="print-btn" class="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-md text-sm">
            Print / Save as PDF
          </button>
        </div>
      </div>

      <!-- Invoice preview (printable) -->
      <div id="invoice-preview" class="invoice-page bg-white border border-slate-200 rounded-xl shadow-sm"></div>

    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
